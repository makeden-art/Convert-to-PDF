<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Просмотр документа</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: #f3f4f6;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 12px 20px;
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }
    header a {
      color: #06b6d4;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    header a:hover {
      color: #22d3ee;
      transform: translateX(-1px);
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      min-width: 160px;
      word-break: break-all;
      color: #f3f4f6;
    }
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.02);
      color: #9ca3af;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .tab:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #e5e7eb;
    }
    .tab.active {
      border-color: #06b6d4;
      color: #22d3ee;
      background: rgba(6, 182, 212, 0.08);
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav button {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: #e5e7eb;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .nav span {
      font-size: 12px;
      color: #9ca3af;
      min-width: 60px;
      text-align: center;
      font-weight: 500;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    #pdf-view {
      flex: 1;
      width: 100%;
      border: none;
      background: #090d16;
      display: none;
      min-height: calc(100vh - 56px);
    }
    #pdf-view.visible {
      display: block;
    }
    #img-view {
      display: none;
      max-width: 100%;
      max-height: calc(100vh - 56px);
      margin: auto;
      object-fit: contain;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
    }
    #img-view.visible {
      display: block;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      gap: 12px;
      background: #090d16;
      font-weight: 500;
    }
    .overlay.error {
      color: #f87171;
    }
    .overlay.hidden {
      display: none;
    }
    .overlay a {
      color: #06b6d4;
      text-decoration: none;
      font-weight: 500;
    }
    .overlay a:hover {
      text-decoration: underline;
    }
    .img-wrap {
      flex: 1;
      overflow: auto;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #090d16;
    }
    .img-wrap.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <header>
    <a href="/convert">← Конвертация</a>
    <h1 id="title">Загрузка…</h1>
    <div class="tabs" id="tabs"></div>
    <div class="nav" id="nav" style="display:none">
      <button type="button" id="btn-prev">◀</button>
      <span id="page-label">—</span>
      <button type="button" id="btn-next">▶</button>
    </div>
  </header>
  <main>
    <iframe id="pdf-view" title="PDF"></iframe>
    <div class="img-wrap" id="img-wrap">
      <img id="img-view" alt="Предпросмотр" />
    </div>
    <div class="overlay" id="loading">Загрузка документа…</div>
    <div class="overlay error hidden" id="error"></div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('path') || '';
    const fileName = params.get('name') || '';

    const state = { path: filePath, page: 1, pages: 1, variant: 'source', variants: [], mode: 'pdf', format: '', loadToken: 0, renderTimeoutSec: 130 };

    const titleEl = document.getElementById('title');
    const tabsEl = document.getElementById('tabs');
    const navEl = document.getElementById('nav');
    const pageLabel = document.getElementById('page-label');
    const pdfView = document.getElementById('pdf-view');
    const imgView = document.getElementById('img-view');
    const imgWrap = document.getElementById('img-wrap');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    async function fetchJson(url, timeoutMs) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const r = await fetch(url, { signal: ctrl.signal });
        let j = {};
        try { j = await r.json(); } catch (_) {}
        if (!r.ok) throw new Error(j.detail || ('HTTP ' + r.status));
        return j;
      } catch (e) {
        if (e.name === 'AbortError') throw new Error('Превышено время ожидания. Сервер занят — попробуйте позже.');
        throw e;
      } finally {
        clearTimeout(timer);
      }
    }

    function showError(msg) {
      loadingEl.classList.add('hidden');
      errorEl.innerHTML = escapeHtml(msg).replace(/\n/g, '<br>') +
        '<br><br><a href="/convert">← Вернуться к конвертации</a>';
      errorEl.classList.remove('hidden');
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function hideOverlay() {
      loadingEl.classList.add('hidden');
      errorEl.classList.add('hidden');
    }

    function modeForVariant(variant) {
      if (variant === 'source' && (state.format === 'dwg' || state.format === 'dxf')) {
        return 'image';
      }
      return 'pdf';
    }

    function renderTabs() {
      tabsEl.innerHTML = '';
      (state.variants || []).forEach(v => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab' + (state.variant === v.id ? ' active' : '');
        btn.textContent = v.label;
        btn.onclick = () => {
          state.variant = v.id;
          state.page = 1;
          state.mode = modeForVariant(v.id);
          renderTabs();
          loadDocument();
        };
        tabsEl.appendChild(btn);
      });
    }

    function updateNav() {
      const multi = state.pages > 1 && state.mode === 'image';
      navEl.style.display = multi ? 'flex' : 'none';
      pageLabel.textContent = multi ? (state.page + ' / ' + state.pages) : '';
      document.getElementById('btn-prev').disabled = state.page <= 1;
      document.getElementById('btn-next').disabled = state.page >= state.pages;
    }

    function showPdf() {
      pdfView.classList.add('visible');
      imgWrap.classList.remove('visible');
      imgView.classList.remove('visible');
    }

    function showImage() {
      pdfView.classList.remove('visible');
      imgWrap.classList.add('visible');
    }

    async function loadDocument() {
      if (!state.path) {
        showError('Не указан путь к файлу');
        return;
      }
      const token = ++state.loadToken;
      loadingEl.classList.remove('hidden');
      loadingEl.textContent = state.mode === 'image'
        ? (state.renderHint || 'Рендер чертежа…')
        : (state.format === 'doc' || state.format === 'docx' ? 'Конвертация для просмотра…' : 'Загрузка PDF…');
      errorEl.classList.add('hidden');
      pdfView.classList.remove('visible');
      imgWrap.classList.remove('visible');
      pdfView.removeAttribute('src');

      try {
        if (state.mode === 'pdf') {
          const url = '/api/view-document?path=' + encodeURIComponent(state.path) +
            '&variant=' + encodeURIComponent(state.variant) +
            (state.pages > 1 ? '#page=' + state.page : '');
          pdfView.onload = () => { if (token === state.loadToken) hideOverlay(); };
          pdfView.onerror = () => { if (token === state.loadToken) showError('Не удалось открыть PDF'); };
          pdfView.src = url;
          showPdf();
          setTimeout(() => {
            if (token === state.loadToken) hideOverlay();
          }, 2000);
          return;
        }

        const url = '/api/preview?path=' + encodeURIComponent(state.path) +
          '&page=' + state.page + '&variant=' + encodeURIComponent(state.variant) +
          '&_=' + Date.now();
        const ctrl = new AbortController();
        const timeoutMs = Math.max(30000, (state.renderTimeoutSec || 130) * 1000 + 10000);
        const timer = setTimeout(() => ctrl.abort(), timeoutMs);
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        if (token !== state.loadToken) return;
        if (!r.ok) {
          let msg = 'Не удалось загрузить предпросмотр';
          try { msg = (await r.json()).detail || msg; } catch (_) {}
          showError(msg);
          return;
        }
        const pagesHdr = r.headers.get('X-Preview-Pages');
        if (pagesHdr) state.pages = Math.max(1, parseInt(pagesHdr, 10) || 1);
        const blob = await r.blob();
        if (token !== state.loadToken) return;
        if (imgView.src && imgView.src.startsWith('blob:')) URL.revokeObjectURL(imgView.src);
        imgView.src = URL.createObjectURL(blob);
        imgView.classList.add('visible');
        showImage();
        updateNav();
        hideOverlay();
      } catch (e) {
        if (token !== state.loadToken) return;
        showError(e.message || String(e));
      }
    }

    async function init() {
      if (!filePath) {
        showError('Не указан путь к файлу');
        return;
      }
      titleEl.textContent = fileName || filePath.split('/').pop() || filePath;
      document.title = 'Просмотр: ' + titleEl.textContent;

      try {
        const j = await fetchJson('/api/preview-info?path=' + encodeURIComponent(filePath), 30000);
        if (!j.previewable) {
          throw new Error(j.message || 'Просмотр недоступен для этого файла');
        }

        state.pages = j.pages || 1;
        state.format = j.format || '';
        state.renderTimeoutSec = j.render_timeout_sec || (j.viewer_mode === 'image' ? 480 : 45);
        state.renderHint = j.message || '';
        state.variants = j.variants && j.variants.length ? j.variants : [{ id: 'source', label: 'Исходник' }];
        state.variant = j.default_variant || (state.variants.some(v => v.id === 'pdf') ? 'pdf' : 'source');
        state.mode = modeForVariant(state.variant);
        renderTabs();
        updateNav();
        await loadDocument();
      } catch (e) {
        showError(e.message || String(e));
      }
    }

    document.getElementById('btn-prev').onclick = () => {
      if (state.page > 1) {
        state.page -= 1;
        updateNav();
        loadDocument();
      }
    };
    document.getElementById('btn-next').onclick = () => {
      if (state.page < state.pages) {
        state.page += 1;
        updateNav();
        loadDocument();
      }
    };

    init();
  </script>
</body>
</html>
