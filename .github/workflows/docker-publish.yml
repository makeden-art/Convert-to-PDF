name: Build and Push Docker Image
# Docker Hub: makeden/convert-to-pdf:latest

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # lisp_Nikolay приватный: GITHUB_TOKEN не видит чужие репозитории.
      # Добавьте секрет REPO_CHECKOUT_TOKEN (classic PAT, scope: repo).
      - name: Checkout ODA package (lisp_Nikolay)
        uses: actions/checkout@v4
        with:
          repository: makeden-art/lisp_Nikolay
          path: oda-src
          token: ${{ secrets.REPO_CHECKOUT_TOKEN }}

      - name: Prepare ODA deb in build context
        run: |
          set -euo pipefail
          deb="$(find oda-src -maxdepth 1 -name 'ODAFileConverter*.deb' -print -quit)"
          if [ -z "$deb" ]; then
            echo "ODA deb не найден в lisp_Nikolay. Проверьте REPO_CHECKOUT_TOKEN." >&2
            exit 1
          fi
          cp "$deb" .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: makeden/convert-to-pdf:latest
